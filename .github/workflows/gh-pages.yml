name: GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  WASM_SHARED_KEY: wasm-rs-v1

jobs:
  check-diff:
    name: Check Differences
    runs-on: ubuntu-slim
    outputs:
      changes: ${{ steps.filter.outputs.source }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check Sources
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            source:
              - 'fonts/**'
              - 'js/**'
              - 'rs/**'
              - 'scripts/**'
              - 'scss/**'
              - 'src/**'
              - 'theme/**'
              - 'book.toml'

  cache-media-files:
    name: Cache Media Files
    runs-on: ubuntu-slim
    if: ${{ github.ref == 'refs/heads/main' }}
    outputs:
      cache-key: ${{ steps.set-cache-key.outputs.cache-key }}
      cache-match: ${{ steps.check-match.outputs.match }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          lfs: false
          fetch-depth: 1
          sparse-checkout: |
            src

      - name: Set Cache Key
        id: set-cache-key
        run: |
          echo "cache-key=media-${{ hashFiles('src/**/*.avif', 'src/**/*.webp', 'src/**/*.webm', 'src/**/*.mp3') }}" >> $GITHUB_OUTPUT

      - name: Restore Media Cache (allow partial match)
        id: cache-source
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: tmp-media
          key: ${{ steps.set-cache-key.outputs.cache-key }}
          restore-keys: media-

      - name: Verify Exact Cache Match
        id: check-match
        run: |
          if [ "${{ steps.cache-source.outputs.cache-hit }}" = "true" ] && \
             [ "${{ steps.cache-source.outputs.cache-matched-key }}" = "${{ steps.set-cache-key.outputs.cache-key }}" ]; then
            echo "match=true" >> $GITHUB_OUTPUT
          else
            echo "match=false" >> $GITHUB_OUTPUT
          fi

      - name: Pull Missing LFS Files (on partial or miss)
        if: steps.check-match.outputs.match != 'true'
        run: |
          git lfs pull --include="src/**/*.avif,src/**/*.webp,src/**/*.webm,src/**/*.mp3"

      - name: Synchronize Media Files
        if: steps.check-match.outputs.match != 'true'
        run: |
          rm -rf tmp-media
          mkdir -p tmp-media
          rsync -a --delete \
            --include='*/' \
            --include='*.avif' \
            --include='*.webp' \
            --include='*.webm' \
            --include='*.mp3' \
            --exclude='*' \
            src/ tmp-media

      - name: Save Media Cache (new primary key)
        if: steps.check-match.outputs.match != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: tmp-media
          key: ${{ steps.set-cache-key.outputs.cache-key }}

  test-wasm:
    name: Test Wasm
    runs-on: ubuntu-26.04-arm
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            rs/wasm

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          cache-workspaces: rs/wasm
          cache-shared-key: ${{ env.WASM_SHARED_KEY }}

      - name: Install Wasm Pack
        uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2
        with:
          tool: wasm-pack

      - name: Test Wasm
        working-directory: rs/wasm
        run: |
          wasm-pack test --headless --firefox

  build-wasm:
    name: Build Wasm
    runs-on: ubuntu-26.04-arm
    needs: test-wasm
    env:
      WASM_BINDGEN_VERSION: "0.2.126" # renovate: datasource=github-releases depName=wasm-bindgen/wasm-bindgen
      BINARYEN_VERSION: "130" # renovate: datasource=github-releases depName=WebAssembly/binaryen
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            rs/wasm

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          cache-workspaces: rs/wasm
          cache-shared-key: ${{ env.WASM_SHARED_KEY }}

      - name: Install Wasm Bindgen
        uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2
        with:
          tool: wasm-bindgen-cli@${{ env.WASM_BINDGEN_VERSION }}

      - name: Build Wasm
        working-directory: rs/wasm
        run: |
          RUSTFLAGS="-C target-feature=+simd128" \
            cargo build --release --target wasm32-unknown-unknown

          wasm-bindgen \
            ./target/wasm32-unknown-unknown/release/wasm_book.wasm \
            --target web \
            --out-dir pkg

      - name: Install Binaryen
        run: |
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-aarch64-linux.tar.gz -o binaryen.tar.gz
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-aarch64-linux.tar.gz.sha256 -o binaryen.sha256
          echo "$(cut -d' ' -f1 binaryen.sha256)  binaryen.tar.gz" | sha256sum -c -

          tar xzf binaryen.tar.gz
          echo "$PWD/binaryen-version_${BINARYEN_VERSION}/bin" >> $GITHUB_PATH

      - name: Optimize Wasm
        working-directory: rs/wasm
        run: |
          wasm-opt ./pkg/wasm_book_bg.wasm \
            -O \
            --enable-simd \
            --enable-nontrapping-float-to-int \
            --enable-bulk-memory \
            --strip-debug \
            --strip-producers \
            --strip-dwarf \
            -o ./pkg/wasm_book_bg.opt.wasm

          mv ./pkg/wasm_book_bg.opt.wasm ./pkg/wasm_book_bg.wasm

      - name: Upload Wasm Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wasm-book
          path: rs/wasm/pkg
          if-no-files-found: error
          retention-days: 1

  test-js:
    name: Test JS
    runs-on: ubuntu-slim
    needs: build-wasm
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            js

      - name: Download Wasm Package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: wasm-book
          path: pkg

      - name: Copy Wasm Bindings
        run: |
          cp pkg/wasm_book.js js
          cp pkg/wasm_book.d.ts js

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .tool-versions
          cache: true

      - name: Run Vitest
        working-directory: js
        run: |
          deno task test:ci

      - name: Upload Vitest Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vitest-report
          path: js/coverage
          if-no-files-found: ignore
          retention-days: 1

  build-js:
    name: Build JS
    runs-on: ubuntu-slim
    needs: [test-js, build-wasm]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            js

      - name: Download Wasm Package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: wasm-book
          path: pkg

      - name: Copy Wasm Bindings
        run: |
          cp pkg/wasm_book.js js
          cp pkg/wasm_book.d.ts js

      - name: Create Highlight Js
        working-directory: js
        run: |
          ./create-highlight.sh

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .tool-versions
          cache: true

      - name: Build
        working-directory: js
        run: |
          deno task bundle

      - name: Upload JS Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-js
          path: js/dist
          if-no-files-found: error
          retention-days: 1

  build-scss:
    name: Build SCSS
    runs-on: ubuntu-slim
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            scss

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .tool-versions
          cache: true

      - name: Build SCSS
        working-directory: scss
        run: |
          deno task build

      - name: Upload CSS Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: css
          path: scss/dist
          if-no-files-found: error
          retention-days: 1

  convert-woff2:
    name: Convert WOFF2
    runs-on: ubuntu-slim
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            fonts

      - name: Cache Woff2
        id: cache-woff2
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: fonts/woff2
          key: python-${{ runner.os }}-fonts-${{ hashFiles('fonts/**') }}

      - name: Setup Uv
        if: steps.cache-woff2.outputs.cache-hit != 'true'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.x"

      - name: Convert and Copy Woff2
        if: steps.cache-woff2.outputs.cache-hit != 'true'
        working-directory: fonts
        run: |
          mkdir -p woff2
          uv run convert.py NerdFontsSymbolsOnly/SymbolsNerdFontMono-Regular.ttf woff2
          uv run convert.py Open_Sans/static/OpenSans-BoldItalic.ttf woff2
          uv run convert.py Open_Sans/static/OpenSans-Italic.ttf woff2
          cp "Fira Code/FiraCode-VF.woff2" woff2

      - name: Upload Font Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: woff2
          path: fonts/woff2
          if-no-files-found: error
          retention-days: 1

  test-mdbook-backend:
    name: Test mdBook Backend
    runs-on: ubuntu-26.04-arm
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            rs/mdbook-footnote

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: stable
          cache-workspaces: rs/mdbook-footnote

      - name: Test Cargo (mdbook footnote)
        working-directory: rs/mdbook-footnote
        run: |
          cargo test --verbose

  publish:
    name: Publish
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.check-diff.outputs.changes == 'true'
    runs-on: ubuntu-26.04-arm
    needs:
      - build-wasm
      - build-js
      - build-scss
      - cache-media-files
      - check-diff
      - convert-woff2
      - test-mdbook-backend
    env:
      MDBOOK_VERSION: "0.5.3" # renovate: datasource=github-releases depName=rust-lang/mdBook
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 1
          lfs: false # Make it clear (just in case) that lfs is not used in this step.
          sparse-checkout: |
            book.toml
            rs/mdbook-footnote
            scripts
            src
            theme
            tmp

      - name: Restore Media Cache
        id: cache-media
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: tmp-media
          key: ${{ needs.cache-media-files.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Remove LFS Pointer
        run: find src -type f \( -name '*.avif' -o -name '*.webp' -o -name '*.webm' -o -name '*.mp3' \) -delete

      - name: Populate Media Files
        run: |
          rsync -a tmp-media/ src/
          rm -rf tmp-media

      - name: Download All Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Copy Files
        run: |
          cp artifacts/wasm-book/wasm_book_bg.wasm src
          cp artifacts/build-js/* src
          cp -r artifacts/woff2 src
          cp -r artifacts/css src
          cp -r tmp src

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: stable

      - name: Install Mdbook
        run: |
          cargo +stable install mdbook --version ${MDBOOK_VERSION}

          #cargo +stable install mdbook-admonish
          cargo +stable install --git https://github.com/CoralPink/mdbook-admonish.git --branch mdbook-v0.5.x

          cargo +stable install mdbook-tailor
          cargo +stable install --path ./rs/mdbook-footnote

      - name: Setup Pages
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Build Book
        run: |
          mdbook build --dest-dir commentary

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .tool-versions
          cache: true

      - name: Run Regenerate
        working-directory: commentary
        run: |
          deno task --config ../scripts/deno.jsonc regenerate

      - name: Compress Search Index
        working-directory: commentary
        run: |
          brotli searchindex.json
          gzip --best --keep --no-name searchindex.json

      - name: Remove Unneeded Files
        working-directory: commentary
        run: |
          rm ayu-highlight.css
          rm book.js
          rm clipboard.min.js
          rm elasticlunr.min.js
          rm fonts.css
          rm highlight.css
          rm highlight.js
          rm mark.min.js
          rm searcher.js
          rm searchindex.js
          rm searchindex.json
          rm toc.html
          rm toc.js
          rm tomorrow-night.css
          rm css/chrome.css
          rm css/variables.css
          rm -rf FontAwesome
          rm -rf fonts

      - name: Upload Pages Artifact
        id: deployment
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: commentary

  deploy:
    name: Deploy
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.check-diff.outputs.changes == 'true'
    runs-on: ubuntu-slim
    needs:
      - check-diff
      - publish
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
